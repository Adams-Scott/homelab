services:
  caddy:
    image: ghcr.io/caddy-dns/cloudflare:latest
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      # Create a Cloudflare API token with DNS edit permissions for your zone.
      - CLOUDFLARE_API_TOKEN=${CLOUDFLARE_API_TOKEN}
      - EMAIL=${EMAIL}
      - DOMAIN=${DOMAIN}
      - HOST_IP=${HOST_IP}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - caddy_proxy

volumes:
  caddy_data:
  caddy_config:

networks:
  caddy_proxy:
    external: true
