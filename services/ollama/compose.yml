services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ./local_ollama_data:/root/.ollama
    devices:
      - /dev/dri:/dev/dri
    networks:
      - caddy_proxy

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: unless-stopped
    #ports:
    #  - "3000:8080"
    environment:
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL}
    volumes:
      - ./local_open-webui_data:/app/data
    networks:
      - caddy_proxy

networks:
  caddy_proxy:
    external: true