services:
  mealie:
    image: ghcr.io/mealie-recipes/mealie:v3.14.0
    container_name: mealie
    restart: always
    #ports:
    #  - "9925:9000"
    deploy:
      resources:
        limits:
          memory: 1000M
    volumes:
      - ./local-data:/app/data/
    environment:
      ALLOW_SIGNUP: "false"
      PUID: 1000
      PGID: 1000
      TZ: America/Los_Angeles
      BASE_URL: ${BASE_URL}

volumes:
  mealie-data: